body:
  text: 賀氏喪服譜宗義古者諸侯之別子及起於是邦為大夫者皆有百代祀之謂之太祖太祖之代則為大宗宗之本統故也其支子旁親非太祖之統謂之小宗小宗之道五代則遷當其為宗宗中奉之加於常禮平居則每事諮告死亡則服之𪗋縗以義加也杜佑通典卷七十三奉宗加於常禮平居即每事諮告凡告宗之例宗內祭祀嫁女娶妻死亡子生行來改易名字皆告若宗子時祭則宗內男女畢會喪亦如之若宗內吉凶之事宗子亦普率宗黨以赴役之若宗子時祭則告于同宗祭畢合族於宗子之家男子女子以班宗子為男主宗婦為女主故云宗子雖七十無無主婦以當合族糺宗故也凡所告子生宗子皆書于宗籍大宗無後則支子以昭穆後之後宗立則宗道存而諸義有主也立主義存而有一人不惇者則會宗而議其罰族不可以無統故立宗宗位既定則常尊歸之理其親親者也是故義定於自然不移名存於政而不繼其人宗子之道也故為宗子者雖在凡才猶當佐之佑之而奉以為主雖有高明之屬盛德之親父兄之尊而不得干其任者所以全正統而一人之情也若姦回淫亂行出軌道有殄宗廢祀之罪者然後乃告諸宗廟而改立其次亦義之權也同上祫祭圖太祖東嚮昭北行南嚮穆南行北嚮通典卷九十四
